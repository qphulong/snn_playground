# ============================================================
# Recording configuration for SNN training
# ============================================================

# How many audio files to train on (null = all files)
max_samples: 1

# ============================================================
# Recording options
# ============================================================

# Weight evolution: list of [input_index, hidden_index] pairs to track over time.
weights_evolution:
  - [0, 0]
  - [0, 1]
  - [42, 7]
  - [100, 50]

# Membrane potential for input neurons.
# Each entry is either:
#   - a plain index:                0            → plot full duration
#   - index + time window:  [0, [100, 200]]      → neuron 0 from 100ms to 200ms
membrane_potential_input:
  - 0
  - [1, [100, 500]]

# Membrane potential for hidden neurons (same syntax as above).
membrane_potential_hidden:
  - 0
  - 1
  - [2, [0, 300]]
  - [400, [500,600]]
  - [401, [500,600]]
  - [402, [500,600]]
  - [403, [500,600]]

# Spike raster plot for input layer (all neurons, per sample).
spike_raster_input: true

# Spike raster plot for hidden layer (all neurons, per sample).
spike_raster_hidden: true

# Save the full N_IN x N_H weight matrix at the end of training.
final_weights_matrix: true

# Per-neuron mean firing rate (x = neuron index, y = Hz).
mean_firing_rate_input: true
mean_firing_rate_hidden: true

# ============================================================
# Visualization options
# ============================================================

# Which sample indices to visualize (0-based).
# Applies to: membrane_potential and spike_raster plots.
# null or empty list = visualize all recorded samples.
visualize_samples: [0]