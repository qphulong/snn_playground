# ============================================================
# Experiment Template
# Copy this file and fill in your values.
# Fields not specified here inherit from config/defaults/base.yaml
# ============================================================

name: "My Experiment"
description: "Describe what this experiment is testing."
version: "1.0"

# ── Audio preprocessing ─────────────────────────────────────
# (only override what differs from base defaults)
audio:
  SCALE: 1.2

# ── Network architecture ─────────────────────────────────────
network:
  layers:
    - name: "input"
      type: "adaptive_lif"        # Options: adaptive_lif, simple_lif, or custom type
      N_neurons: 900
      neuron_params:
        tau_m: 10
        tau_a: 100
        beta: 0.2
        v_th: 1.0

    - name: "hidden"
      type: "simple_lif"
      N_neurons: 500              # <-- change architecture here
      neuron_params:
        tau_m: 10
        v_th: 1.0

  synapses:
    - name: "input_to_hidden"
      src_layer: "input"
      tgt_layer: "hidden"
      connectivity:
        type: "dense"             # Options: dense, sparse, graph
        # sparsity: 0.3           # (sparse only)
        # graph_source: "graphs/my_graph.npz"  # (graph only)
      learning_rule:
        type: "stdp"              # Options: stdp, or custom type
        taupre: 20
        taupost: 20
        Apre_delta: 0.01
        Apost_delta: -0.0105
        wmax: 0.3
        wmin: 0.0
        w_init_mean: 0.5
        homeostasis_norm: 225.0

# ── Training ─────────────────────────────────────────────────
training:
  max_samples: 100
  checkpoint_interval: 10
  dt: 0.1
  seed: 42
